<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect 4 Arena - Local Play</title>
    <style>
        nav { background-color: #333; padding: 10px; }
        nav a { color: white; margin-right: 15px; text-decoration: none; font-family: Arial, sans-serif; }
        nav a:hover { text-decoration: underline; }
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; margin: 0; padding: 0; }
        main { padding: 20px; display: flex; flex-direction: column; align-items: center; }

        #game-status {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        #player-names {
            display: flex;
            gap: 40px;
            margin-bottom: 15px;
            font-size: 16px;
        }
        .player-label {
            padding: 6px 16px;
            border-radius: 20px;
            font-weight: bold;
        }
        .player-label.red-label  { background: #f8d7da; color: #721c24; border: 2px solid #dc3545; }
        .player-label.yellow-label { background: #fff3cd; color: #856404; border: 2px solid #ffc107; }

        #board {
            display: grid;
            grid-template-columns: repeat(7, 60px);
            grid-template-rows: repeat(6, 60px);
            gap: 10px;
            background-color: #0056b3;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }

        .cell {
            width: 60px;
            height: 60px;
            background-color: white;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: inset 0 3px 5px rgba(0,0,0,0.2);
        }

        .cell.red    { background-color: #dc3545; }
        .cell.yellow { background-color: #ffc107; }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #0056b3;
            color: white;
            border: none;
            border-radius: 5px;
        }
        button:hover { background-color: #004494; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Home</a>
        <a href="rules.html">Rules</a>
        <a href="local-play.html">Local Play</a>
        <a href="ai-play.html">Vs AI</a>
        <a href="register-profile.html">Profile/Register</a>
        <a href="match-history.html">Match History</a>
        <a href="leaderboard.html">Leaderboard</a>
        <a href="admin.html">Admin Dashboard</a>
        <a href="checkpoints.html">Checkpoints Log</a>
    </nav>

    <main>
        <h1>Local Couch Co-op</h1>

        <div id="player-names">
            <span class="player-label red-label"    id="label-p1">Player 1 (Red)</span>
            <span class="player-label yellow-label" id="label-p2">Player 2 (Yellow)</span>
        </div>

        <div id="game-status">Red's Turn!</div>
        <div id="board"></div>
        <button id="reset-btn">Reset Game</button>
    </main>

    <script>
        // ── Constants & State ───────────────────────────────────────
        const ROWS = 6;
        const COLS = 7;
        let boardState  = [];
        let currentPlayer = 'red';
        let gameActive    = true;

        // ── Read logged-in username from sessionStorage ─────────────
        function getLoggedInUsername() {
            const session = sessionStorage.getItem('connect4_active_session');
            return session ? JSON.parse(session).username : null;
        }

        // Player 1 = logged-in user (if any), otherwise "Player 1"
        // Player 2 = always "Player 2 (Local)" for local co-op
        function getPlayerNames() {
            const username = getLoggedInUsername();
            const p1 = username || 'Player 1';
            const p2 = 'Player 2 (Local)';
            return { p1, p2 };
        }

        // ── DOM refs ────────────────────────────────────────────────
        const boardElement  = document.getElementById('board');
        const statusElement = document.getElementById('game-status');
        const resetBtn      = document.getElementById('reset-btn');
        const labelP1       = document.getElementById('label-p1');
        const labelP2       = document.getElementById('label-p2');

        // ── Init ────────────────────────────────────────────────────
        function initGame() {
            boardState    = [];
            boardElement.innerHTML = '';
            currentPlayer = 'red';
            gameActive    = true;

            const { p1, p2 } = getPlayerNames();
            labelP1.textContent = `${p1} (Red)`;
            labelP2.textContent = `${p2} (Yellow)`;

            statusElement.textContent  = `${p1}'s Turn! (Red)`;
            statusElement.style.color  = '#dc3545';

            for (let r = 0; r < ROWS; r++) {
                let row = [];
                for (let c = 0; c < COLS; c++) {
                    row.push(null);
                    const cell = document.createElement('div');
                    cell.classList.add('cell');
                    cell.dataset.row = r;
                    cell.dataset.col = c;
                    cell.addEventListener('click', () => handleDrop(c));
                    boardElement.appendChild(cell);
                }
                boardState.push(row);
            }
        }

        // ── Drop piece ──────────────────────────────────────────────
        function handleDrop(col) {
            if (!gameActive) return;

            for (let r = ROWS - 1; r >= 0; r--) {
                if (boardState[r][col] === null) {
                    boardState[r][col] = currentPlayer;

                    const allCells = boardElement.querySelectorAll('.cell');
                    allCells[r * COLS + col].classList.add(currentPlayer);

                    if (checkWin(r, col)) {
                        gameActive = false;
                        const winner = currentPlayer === 'red' ? 'Red' : 'Yellow';
                        const { p1, p2 } = getPlayerNames();
                        const winnerName = currentPlayer === 'red' ? p1 : p2;
                        statusElement.textContent = `🎉 ${winnerName} Wins!`;
                        statusElement.style.color  = currentPlayer === 'red' ? '#dc3545' : '#856404';
                        saveMatchResult(winner);
                        return;
                    }

                    // Check draw
                    if (boardState[0].every(cell => cell !== null)) {
                        gameActive = false;
                        statusElement.textContent = "It's a Draw!";
                        saveMatchResult('Draw');
                        return;
                    }

                    currentPlayer = currentPlayer === 'red' ? 'yellow' : 'red';

                    const { p1, p2 } = getPlayerNames();
                    const nextName = currentPlayer === 'red' ? p1 : p2;
                    const nextColor = currentPlayer === 'red' ? 'Red' : 'Yellow';
                    statusElement.textContent = `${nextName}'s Turn! (${nextColor})`;
                    statusElement.style.color  = currentPlayer === 'red' ? '#dc3545' : '#ffc107';
                    return;
                }
            }
        }

        // ── Win detection ────────────────────────────────────────────
        function checkWin(row, col) {
            function countDir(dx, dy) {
                let count = 0, r = row + dy, c = col + dx;
                while (r >= 0 && r < ROWS && c >= 0 && c < COLS && boardState[r][c] === currentPlayer) {
                    count++; r += dy; c += dx;
                }
                return count;
            }
            if (countDir(-1, 0) + countDir(1, 0) >= 3) return true;
            if (countDir(0, 1) >= 3) return true;
            if (countDir(-1, 1) + countDir(1, -1) >= 3) return true;
            if (countDir(-1, -1) + countDir(1, 1) >= 3) return true;
            return false;
        }

        // ── Save match to localStorage ───────────────────────────────
        function saveMatchResult(winner) {
            const matches = JSON.parse(localStorage.getItem('connect4_matches') || '[]');
            const { p1, p2 } = getPlayerNames();

            const newMatch = {
                id:        Date.now(),
                type:      'local-pvp',
                winner:    winner,
                player1:   p1,
                player2:   p2,
                date:      new Date().toLocaleDateString(),
                timestamp: Date.now()
            };
            matches.push(newMatch);
            localStorage.setItem('connect4_matches', JSON.stringify(matches));
        }

        resetBtn.addEventListener('click', initGame);
        initGame();
    </script>
</body>
</html>
