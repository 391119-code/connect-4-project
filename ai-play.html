<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect 4 Arena - Vs AI</title>
    <style>
        nav { background-color: #333; padding: 10px; }
        nav a { color: white; margin-right: 15px; text-decoration: none; font-family: Arial, sans-serif; }
        nav a:hover { text-decoration: underline; }
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; margin: 0; padding: 0; }
        main { padding: 20px; display: flex; flex-direction: column; align-items: center; }

        #game-status {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        /* Who's playing banner */
        #matchup-banner {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
            font-size: 16px;
        }
        .player-chip {
            padding: 6px 16px;
            border-radius: 20px;
            font-weight: bold;
        }
        .chip-player { background: #f8d7da; color: #721c24; border: 2px solid #dc3545; }
        .chip-ai     { background: #fff3cd; color: #856404; border: 2px solid #ffc107; }
        .chip-vs     { font-weight: bold; color: #555; font-size: 14px; }

        #board {
            display: grid;
            grid-template-columns: repeat(7, 60px);
            grid-template-rows: repeat(6, 60px);
            gap: 10px;
            background-color: #0056b3;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }

        .cell {
            width: 60px;
            height: 60px;
            background-color: white;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: inset 0 3px 5px rgba(0,0,0,0.2);
            transition: background-color 0.1s ease;
        }

        .cell.red    { background-color: #dc3545; cursor: default; }
        .cell.yellow { background-color: #ffc107; cursor: default; }

        #board.ai-thinking .cell { cursor: not-allowed; }

        #difficulty-selector {
            margin-bottom: 20px;
            font-size: 16px;
        }
        #difficulty-selector label { font-weight: bold; margin-right: 10px; }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #0056b3;
            color: white;
            border: none;
            border-radius: 5px;
        }
        button:hover { background-color: #004494; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Home</a>
        <a href="rules.html">Rules</a>
        <a href="local-play.html">Local Play</a>
        <a href="ai-play.html">Vs AI</a>
        <a href="register-profile.html">Profile/Register</a>
        <a href="match-history.html">Match History</a>
        <a href="leaderboard.html">Leaderboard</a>
        <a href="admin.html">Admin Dashboard</a>
        <a href="checkpoints.html">Checkpoints Log</a>
    </nav>

    <main>
        <h1>Play vs AI</h1>

        <div id="difficulty-selector">
            <label for="difficulty">AI Difficulty:</label>
            <select id="difficulty">
                <option value="easy">Easy (Random)</option>
                <option value="medium" selected>Medium (Smart)</option>
                <option value="hard">Hard (Ruthless)</option>
            </select>
        </div>

        <!-- Shows "YourName (Red)  vs  AI (Yellow)" -->
        <div id="matchup-banner">
            <span class="player-chip chip-player" id="chip-player">You (Red)</span>
            <span class="chip-vs">vs</span>
            <span class="player-chip chip-ai"    id="chip-ai">AI (Yellow)</span>
        </div>

        <div id="game-status">Your Turn! (Red)</div>
        <div id="board"></div>
        <button id="reset-btn">New Game</button>
    </main>

    <script>
        // ── Constants & State ────────────────────────────────────────
        const ROWS   = 6;
        const COLS   = 7;
        const PLAYER = 'red';
        const AI     = 'yellow';

        let boardState = [];
        let gameActive = true;
        let isAITurn   = false;

        // ── Read logged-in username ──────────────────────────────────
        function getLoggedInUsername() {
            const session = sessionStorage.getItem('connect4_active_session');
            return session ? JSON.parse(session).username : null;
        }

        function getPlayerLabel() {
            return getLoggedInUsername() || 'Player';
        }

        // ── DOM refs ─────────────────────────────────────────────────
        const boardElement     = document.getElementById('board');
        const statusElement    = document.getElementById('game-status');
        const resetBtn         = document.getElementById('reset-btn');
        const difficultySelect = document.getElementById('difficulty');
        const chipPlayer       = document.getElementById('chip-player');
        const chipAI           = document.getElementById('chip-ai');

        // ── Init ─────────────────────────────────────────────────────
        function initGame() {
            boardState = [];
            boardElement.innerHTML = '';
            boardElement.classList.remove('ai-thinking');
            gameActive = true;
            isAITurn   = false;

            const playerName = getPlayerLabel();
            const difficulty = difficultySelect.value;
            const aiLabel    = `AI (${difficulty.charAt(0).toUpperCase() + difficulty.slice(1)})`;

            chipPlayer.textContent = `${playerName} (Red)`;
            chipAI.textContent     = `${aiLabel} (Yellow)`;

            statusElement.textContent = `${playerName}'s Turn! (Red)`;
            statusElement.style.color = '#dc3545';

            for (let r = 0; r < ROWS; r++) {
                let row = [];
                for (let c = 0; c < COLS; c++) {
                    row.push(null);
                    const cell = document.createElement('div');
                    cell.classList.add('cell');
                    cell.dataset.col = c;
                    cell.addEventListener('click', () => handlePlayerDrop(c));
                    boardElement.appendChild(cell);
                }
                boardState.push(row);
            }
        }

        // ── Drop logic ───────────────────────────────────────────────
        function dropPiece(col, color) {
            for (let r = ROWS - 1; r >= 0; r--) {
                if (boardState[r][col] === null) {
                    boardState[r][col] = color;
                    const allCells = boardElement.querySelectorAll('.cell');
                    allCells[r * COLS + col].classList.add(color);
                    return r;
                }
            }
            return -1;
        }

        // ── Player turn ──────────────────────────────────────────────
        function handlePlayerDrop(col) {
            if (!gameActive || isAITurn) return;

            const row = dropPiece(col, PLAYER);
            if (row === -1) return;

            if (checkWin(row, col, PLAYER)) {
                gameActive = false;
                const playerName = getPlayerLabel();
                statusElement.textContent = `🎉 ${playerName} Wins!`;
                statusElement.style.color  = '#dc3545';
                saveMatchResult('Player');
                return;
            }

            if (isBoardFull()) {
                gameActive = false;
                statusElement.textContent = "It's a Draw!";
                saveMatchResult('Draw');
                return;
            }

            isAITurn = true;
            boardElement.classList.add('ai-thinking');
            statusElement.textContent = 'AI is thinking...';
            statusElement.style.color  = '#ffc107';
            setTimeout(handleAITurn, 500);
        }

        // ── AI turn ──────────────────────────────────────────────────
        function handleAITurn() {
            if (!gameActive) return;

            const col = getAIMove(difficultySelect.value);
            const row = dropPiece(col, AI);

            if (checkWin(row, col, AI)) {
                gameActive = false;
                statusElement.textContent = '🤖 AI Wins! Better luck next time.';
                statusElement.style.color  = '#856404';
                boardElement.classList.remove('ai-thinking');
                saveMatchResult('AI');
                return;
            }

            if (isBoardFull()) {
                gameActive = false;
                statusElement.textContent = "It's a Draw!";
                boardElement.classList.remove('ai-thinking');
                saveMatchResult('Draw');
                return;
            }

            isAITurn = false;
            boardElement.classList.remove('ai-thinking');
            const playerName = getPlayerLabel();
            statusElement.textContent = `${playerName}'s Turn! (Red)`;
            statusElement.style.color  = '#dc3545';
        }

        // ── AI brain ─────────────────────────────────────────────────
        function getAIMove(difficulty) {
            if (difficulty === 'easy') return getRandomMove();

            for (let c = 0; c < COLS; c++) {
                if (canDrop(c)) {
                    const r = simulateDrop(c, AI);
                    if (r !== -1 && checkWin(r, c, AI)) { undoSimulate(r, c); return c; }
                    undoSimulate(r, c);
                }
            }
            for (let c = 0; c < COLS; c++) {
                if (canDrop(c)) {
                    const r = simulateDrop(c, PLAYER);
                    if (r !== -1 && checkWin(r, c, PLAYER)) { undoSimulate(r, c); return c; }
                    undoSimulate(r, c);
                }
            }
            if (difficulty === 'hard') {
                for (let c of [3, 2, 4, 1, 5, 0, 6]) {
                    if (canDrop(c)) return c;
                }
            }
            return getRandomMove();
        }

        function getRandomMove() {
            const valid = [];
            for (let c = 0; c < COLS; c++) if (canDrop(c)) valid.push(c);
            return valid[Math.floor(Math.random() * valid.length)];
        }

        function canDrop(col) { return boardState[0][col] === null; }

        function simulateDrop(col, color) {
            for (let r = ROWS - 1; r >= 0; r--) {
                if (boardState[r][col] === null) { boardState[r][col] = color; return r; }
            }
            return -1;
        }

        function undoSimulate(row, col) { if (row !== -1) boardState[row][col] = null; }

        // ── Win detection ─────────────────────────────────────────────
        function checkWin(row, col, color) {
            function countDir(dx, dy) {
                let count = 0, r = row + dy, c = col + dx;
                while (r >= 0 && r < ROWS && c >= 0 && c < COLS && boardState[r][c] === color) {
                    count++; r += dy; c += dx;
                }
                return count;
            }
            if (countDir(-1, 0) + countDir(1, 0) >= 3) return true;
            if (countDir(0, 1) >= 3) return true;
            if (countDir(-1, 1) + countDir(1, -1) >= 3) return true;
            if (countDir(-1, -1) + countDir(1, 1) >= 3) return true;
            return false;
        }

        function isBoardFull() { return boardState[0].every(c => c !== null); }

        // ── Save match ────────────────────────────────────────────────
        function saveMatchResult(winner) {
            const matches  = JSON.parse(localStorage.getItem('connect4_matches') || '[]');
            const playerName = getPlayerLabel();
            const difficulty = difficultySelect.value;
            const aiLabel    = `AI (${difficulty.charAt(0).toUpperCase() + difficulty.slice(1)})`;

            matches.push({
                id:         Date.now(),
                type:       'vs-AI',
                difficulty: difficulty,
                winner:     winner,
                player1:    playerName,
                player2:    aiLabel,
                date:       new Date().toLocaleDateString(),
                timestamp:  Date.now()
            });
            localStorage.setItem('connect4_matches', JSON.stringify(matches));
        }

        // Re-init when difficulty changes (updates the banner label)
        difficultySelect.addEventListener('change', initGame);
        resetBtn.addEventListener('click', initGame);
        initGame();
    </script>
</body>
</html>
